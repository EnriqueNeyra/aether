substitutions:
  fw_version: "1.0.0"

esphome:
  name: aether
  name_add_mac_suffix: true
  friendly_name: Aether AQMonitor
  project:
    name: "neyra.aether"
    version: ${fw_version}
  includes:
    - components/aether_epaper/aether_epaper.h
    - components/aether_epaper/aether_epaper_layout.h
    - components/aether_epaper/fonts/Inter_Bold9pt7b.h
    - components/aether_epaper/fonts/Inter_Bold12pt7b.h
    - components/aether_epaper/fonts/Inter_Bold18pt7b.h
    - components/aether_epaper/fonts/Inter_Bold_Tabular18pt7b.h
    - components/aether_epaper/fonts/Inter_Bold_Tabular24pt7b.h
    - components/aether_epaper/fonts/Satoshi_800_Device_Information_Subset18pt7b.h
    - components/aether_epaper/fonts/Satoshi_800_Factory_Reset_Subset22pt7b.h
    - components/aether_epaper/fonts/Satoshi_800_Logo_Subset22pt7b.h

  on_boot:
    priority: -100 # Run after all sensors/components are initialized
    then:
      - delay: 10min # Duration the AP remains active for setup
      - if:
          condition:
            not:
              wifi.connected:
          then:
            - logger.log: "No WiFi configured. Disabling AP to enter Offline Mode."
            - wifi.disable:

  platformio_options:
    lib_ldf_mode: deep+
    lib_deps:
      - zinggjm/GxEPD2@^1.6.4
      - adafruit/Adafruit GFX Library@^1.12.3
      - adafruit/Adafruit BusIO@^1.15.0
      - ricmoo/QRCode@^0.0.1

esp32:
  board: esp32-c3-devkitm-1
  variant: esp32c3
  framework:
    type: arduino

logger:
  level: INFO

button:
  - platform: factory_reset
    name: "Factory Reset"
    id: aether_factory_reset

switch:
  - platform: template
    name: "Temperature Unit (Celsius)"
    id: temp_unit_c_switch
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    icon: "mdi:temperature-celsius"

api:
  reboot_timeout: 0s

ota:
  - platform: esphome
  - platform: http_request
    id: ota_http

http_request:
  verify_ssl: false # required on Arduino framework for HTTPS

update:
  - platform: http_request
    id: aether_fw_update
    name: "Aether Firmware"
    source: "https://enriqueneyra.github.io/aether/ota-manifest.json"
    update_interval: 24h

wifi:
  ap:
    ap_timeout: 1min
  reboot_timeout: 0s
  power_save_mode: NONE
  fast_connect: false

binary_sensor:
  - platform: gpio
    pin:
      number: 9
      inverted: true
      mode: INPUT_PULLUP
    name: "Boot Button"
    id: boot_button
    on_multi_click:
      - timing:
          - ON for 50ms to 1s
        then:
          - lambda: |-
              aether::aether_epaper::on_short_press();
      - timing:
          - ON for at least 3s
        then:
          - lambda: |-
              if (aether::aether_epaper::on_long_press()) {
                id(aether_factory_reset).press();
              }
captive_portal:
improv_serial:
esp32_improv:
  authorizer: none

mdns:
  services:
    - service: _http
      protocol: _tcp
      port: 80
      txt: { path: "/" }

web_server:
  port: 80
  version: 3
  local: true
  include_internal: true

external_components:
  - source:
      type: local
      path: components
    components: [aether_web_ui]
  - source:
      type: git
      url: https://github.com/esphome/esphome
      ref: dev
    components: [sen6x, sensirion_common]

# ─── Buses ─────────────────────────────────────────────────────────────────────

i2c:
  sda: 10
  scl: 0
  scan: true
  id: bus_a

# ─── Sensors (IDs used by display + web UI) ───────────────────────────────────

sensor:
  # SEN66 (PM / VOC / NOx / CO2 / Temp / RH)
  - platform: sen6x
    id: sen66_component
    i2c_id: bus_a
    address: 0x6B
    update_interval: 10s

    # PM values
    pm_1_0:
      id: pm1_0
      name: "PM1.0"
    pm_2_5:
      id: pm2_5
      name: "PM2.5"
    pm_4_0:
      id: pm4_0
      name: "PM4.0"
    pm_10_0:
      id: pm10_0
      name: "PM10"

    # Gas Indices
    voc:
      id: voc_index
      name: "VOC Index"
    nox:
      id: nox_index
      name: "NOx Index"

    # CO2
    co2:
      id: co2
      name: "CO2"

    # Temperature & Humidity
    temperature:
      id: temp
      name: "Temperature"
    humidity:
      id: rh
      name: "Humidity"

# ── Aether custom UI component (external) ───────────────────────────────────────
aether_web_ui:
  co2: co2
  pm25: pm2_5
  temp: temp
  rh: rh
  pm1: pm1_0
  pm4: pm4_0
  pm10: pm10_0
  voc: voc_index
  nox: nox_index
  fw_update: aether_fw_update
  temp_unit_switch: temp_unit_c_switch

# ─── Main UI / E-paper render loop ────────────────────────────────────────────

interval:
  - interval: 500ms
    then:
      - lambda: |-
          aether::aether_epaper::tick_and_draw(
            id(co2).state,
            id(temp).state,
            id(rh).state,
            id(pm1_0).state,
            id(pm2_5).state,
            id(pm4_0).state,
            id(pm10_0).state,
            id(voc_index).state,
            id(nox_index).state,
            !id(temp_unit_c_switch).state
          );
